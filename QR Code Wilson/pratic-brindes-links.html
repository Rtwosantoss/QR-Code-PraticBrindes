<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pratic Brindes</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Work+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap');

  :root{
    --kraft: #EFE7D5;
    --kraft-dark: #E2D6B8;
    --ink: #1F2A22;
    --pine: #1C3B2E;
    --pine-light: #2C5340;
    --gold: #B8863A;
    --gold-light: #D3A55C;
    --clay: #A8462F;
  }

  *{ box-sizing: border-box; }

  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(circle at 1px 1px, rgba(28,59,46,0.07) 1px, transparent 0) 0 0/22px 22px,
      var(--kraft);
    font-family: 'Work Sans', sans-serif;
    color: var(--ink);
    display:flex;
    align-items:center;
    justify-content:center;
    padding: 40px 16px;
  }

  .tag{
    position:relative;
    width:100%;
    max-width: 380px;
    background: #FBF7EC;
    border-radius: 18px 18px 10px 10px;
    box-shadow:
      0 1px 0 rgba(255,255,255,0.6) inset,
      0 18px 40px rgba(28,42,34,0.18),
      0 2px 6px rgba(28,42,34,0.10);
    padding: 44px 30px 34px;
    border: 1px solid rgba(31,42,34,0.08);
  }

  .tag::before{
    content:"";
    position:absolute;
    top:-30px;
    left:50%;
    transform: translateX(-50%);
    width:2px;
    height:34px;
    background: repeating-linear-gradient(180deg, var(--pine) 0 6px, transparent 6px 9px);
  }

  .hole{
    position:absolute;
    top:14px;
    left:50%;
    transform:translateX(-50%);
    width:16px;
    height:16px;
    border-radius:50%;
    background: var(--kraft);
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.25), 0 1px 0 rgba(255,255,255,0.5);
  }

  .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--gold);
    text-align:center;
    margin: 18px 0 6px;
  }

  h1{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size: 32px;
    line-height: 1.05;
    text-align:center;
    color: var(--pine);
    margin: 0 0 6px;
  }

  .tagline{
    text-align:center;
    font-size:13.5px;
    color: rgba(31,42,34,0.6);
    margin: 0 0 30px;
  }

  .stamp{
    position:absolute;
    top:38px;
    right:26px;
    width:52px;
    height:52px;
    border:1.5px solid var(--clay);
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    transform: rotate(-9deg);
    opacity: 0.85;
  }
  .stamp span{
    font-family:'IBM Plex Mono', monospace;
    font-size:8px;
    letter-spacing:0.08em;
    color: var(--clay);
    text-align:center;
    text-transform:uppercase;
    line-height:1.3;
  }

  .links{
    display:flex;
    flex-direction:column;
    gap:12px;
  }

  .link{
    display:flex;
    align-items:center;
    gap:14px;
    text-decoration:none;
    background: var(--pine);
    color: #FBF7EC;
    padding: 15px 18px;
    border-radius: 10px;
    transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    box-shadow: 0 2px 0 rgba(28,42,34,0.15);
  }
  .link:hover{
    background: var(--pine-light);
    transform: translateY(-2px);
    box-shadow: 0 6px 14px rgba(28,42,34,0.22);
  }
  .link:active{ transform: translateY(0); }

  .link.secondary{
    background: transparent;
    border: 1.5px solid var(--pine);
    color: var(--pine);
    box-shadow:none;
  }
  .link.secondary:hover{
    background: rgba(28,59,46,0.06);
  }

  .icon{
    width:22px;
    height:22px;
    flex-shrink:0;
  }

  .label{
    display:flex;
    flex-direction:column;
    gap:1px;
  }
  .label b{ font-size:14.5px; font-weight:600; }
  .label small{ font-size:11px; opacity:0.75; font-weight:400; }

  footer{
    margin-top: 28px;
    text-align:center;
    font-family:'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.06em;
    color: rgba(31,42,34,0.45);
    text-transform: uppercase;
  }

  @media (prefers-reduced-motion: reduce){
    .link{ transition:none; }
  }
</style>
</head>
<body>

  <div class="tag">
    <div class="hole"></div>
    <div class="stamp"><span>Feito<br>sob<br>medida</span></div>

    <div class="eyebrow">Brindes personalizados</div>
    <h1>Pratic Brindes</h1>
    <p class="tagline">Marília &middot; SP</p>

    <div class="links">
      <a class="link" href="https://wa.me/5514991023234?text=Ol%C3%A1%21%20Vim%20pelo%20seu%20cart%C3%A3o%20da%20empresa" target="_blank" rel="noopener">
        <svg class="icon" viewBox="0 0 24 24" fill="none">
          <path d="M12 2C6.48 2 2 6.48 2 12c0 1.85.5 3.58 1.36 5.07L2 22l5.06-1.33A9.94 9.94 0 0 0 12 22c5.52 0 10-4.48 10-10S17.52 2 12 2Z" fill="#FBF7EC" fill-opacity="0.14"/>
          <path d="M16.7 14.1c-.26-.13-1.53-.75-1.77-.84-.24-.09-.41-.13-.58.13-.17.26-.66.84-.81 1.01-.15.17-.3.19-.56.06-.26-.13-1.09-.4-2.08-1.28-.77-.68-1.29-1.53-1.44-1.79-.15-.26-.02-.4.11-.53.11-.11.26-.3.39-.44.13-.15.17-.26.26-.43.09-.17.04-.32-.02-.45-.06-.13-.58-1.39-.79-1.9-.21-.5-.42-.43-.58-.44h-.5c-.17 0-.45.06-.68.32-.24.26-.9.88-.9 2.14 0 1.26.92 2.48 1.05 2.65.13.17 1.81 2.77 4.39 3.88.61.26 1.09.42 1.46.54.61.19 1.17.17 1.61.1.49-.07 1.53-.62 1.75-1.23.22-.6.22-1.11.15-1.22-.06-.11-.24-.17-.5-.3Z" fill="#FBF7EC"/>
        </svg>
        <span class="label"><b>WhatsApp</b><small>Fale com a gente agora</small></span>
      </a>

      <a class="link secondary" href="https://www.praticbrindes.com.br/" target="_blank" rel="noopener">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
          <circle cx="12" cy="12" r="9"/>
          <path d="M3 12h18M12 3c2.5 2.5 3.8 5.7 3.8 9s-1.3 6.5-3.8 9c-2.5-2.5-3.8-5.7-3.8-9S9.5 5.5 12 3Z"/>

      <a class="link secondary" href="https://www.instagram.com/praticbrindes_marilia" target="_blank" rel="noopener">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
          <rect x="3" y="3" width="18" height="18" rx="5"/>
          <circle cx="12" cy="12" r="4"/>
          <circle cx="17.2" cy="6.8" r="1"/>
        </svg>
        <span class="label"><b>Instagram</b><small>@praticbrindes_marilia</small></span>
      </a>
    </div>

    <footer>Marília &middot; SP &mdash; brindes que carregam sua marca</footer>
  </div>

</body>
</html>
